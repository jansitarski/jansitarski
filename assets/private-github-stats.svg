<svg width="495" height="180" viewBox="0 0 495 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
    <title id="title">jansitarski's GitHub Stats</title>
    <style>
        .bg { fill: #0D1117; }
        .border { stroke: rgba(56, 139, 253, 0.4); }
        .grid-line { stroke: rgba(56, 139, 253, 0.1); }
        .title, .label { fill: #C9D1D9; }
        .value { fill: #F0F6FC; }
        .accent { fill: #58A6FF; }
        .timestamp { fill: #8B949E; }

        @media (prefers-color-scheme: light) {
            .bg { fill: #F6F8FA; }
            .border { stroke: rgba(31, 35, 40, 0.2); }
            .grid-line { stroke: rgba(31, 35, 40, 0.07); }
            .title, .label { fill: #57606A; }
            .value { fill: #1F2328; }
            .accent { fill: #0969DA; }
            .timestamp { fill: #656D76; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .stat { animation: slideIn 0.5s ease-out forwards; }
        .stat:nth-child(1) { animation-delay: 0.1s; }
        .stat:nth-child(2) { animation-delay: 0.2s; }
        .stat:nth-child(3) { animation-delay: 0.3s; }
        .stat:nth-child(4) { animation-delay: 0.4s; }
        .title { animation: fadeIn 0.5s ease-out; }

        .title {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-weight: 400;
            font-size: 16px;
        }
        .label {
            font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .value {
            font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -1px;
        }
        .timestamp {
            font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 10px;
        }
    </style>

    <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" class="grid-line" stroke-width="0.5"/>
        </pattern>
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
            <feComposite operator="in" in2="SourceGraphic" result="monoNoise"/>
            <feBlend in="SourceGraphic" in2="monoNoise" mode="multiply" opacity="0.05" />
        </filter>
    </defs>

    <rect x="0.5" y="0.5" width="494" height="179" rx="6" class="bg border" stroke-width="1"/>
    <rect width="495" height="180" fill="url(#grid)" filter="url(#noise)" clip-path="url(#clip)"/>
    <clipPath id="clip"><rect x="0.5" y="0.5" width="494" height="179" rx="6"/></clipPath>

    <g transform="translate(25, 25)">
        <text class="title" x="0" y="10">jansitarski / GitHub Activity</text>
    </g>

    <g class="stats-grid" transform="translate(25, 60)">
        
        <!-- STAT 1: Public Repos -->
        <g class="stat" style="opacity:0" transform="translate(0, 0)">
            <text class="value" x="0" y="28">15</text>
            <text class="label" x="0" y="45">Public Repos</text>
            <rect class="accent" x="0" y="0" width="2" height="12" rx="1"/>
        </g>
    
        <!-- STAT 2: Private Repos -->
        <g class="stat" style="opacity:0" transform="translate(150, 0)">
            <text class="value" x="0" y="28">48</text>
            <text class="label" x="0" y="45">Private Repos</text>
            <rect class="accent" x="0" y="0" width="2" height="12" rx="1"/>
        </g>
    
        <!-- STAT 3: Merged PRs -->
        <g class="stat" style="opacity:0" transform="translate(0, 65)">
            <text class="value" x="0" y="28">43</text>
            <text class="label" x="0" y="45">Merged PRs</text>
            <rect class="accent" x="0" y="0" width="2" height="12" rx="1"/>
        </g>
    
        <!-- STAT 4: Total Commits -->
        <g class="stat" style="opacity:0" transform="translate(150, 65)">
            <text class="value" x="0" y="28">1,111</text>
            <text class="label" x="0" y="45">Total Commits</text>
            <rect class="accent" x="0" y="0" width="2" height="12" rx="1"/>
        </g>
    
    </g>

    <g transform="translate(350, 25)">
        <path d="M11.25 8.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" class="accent"/>
        <path fill-rule="evenodd" d="M3.678 1.16A2.25 2.25 0 0 1 5.75 0h4.5A2.25 2.25 0 0 1 12.5 2.25v.344c.368.13.71.322 1.022.563a.75.75 0 1 1-.94 1.168A3.733 3.733 0 0 0 11 4.01V2.25a.75.75 0 0 0-.75-.75h-4.5a.75.75 0 0 0-.75.75v11.5c0 .414.336.75.75.75h.344c.13-.368.322-.71.563-1.022a.75.75 0 1 1 1.168.94A3.733 3.733 0 0 1 7.01 15H5.75A2.25 2.25 0 0 1 3.5 12.75V1.75c0-.22.032-.433.09-.638.05-.173.118-.338.2-.492ZM15.25 8.5a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-3.75.75a1.5 1.5 0 1 0 3 0 1.5 1.5 0 0 0-3 0Z" class="accent"/>
    </g>

    <text class="timestamp" x="470" y="165" text-anchor="end">updated: 2026-04-29</text>
</svg>