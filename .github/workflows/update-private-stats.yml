name: Update private stats

on:
  schedule:
    - cron: '17 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-private-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Update private-aware stats artifacts
        env:
          GITHUB_USERNAME: jansitarski
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: python scripts/update_private_stats.py

      - name: Commit updated private stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update private stats'
          file_pattern: gh_stats.svg README.md
