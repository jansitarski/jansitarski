name: Update private stats

on:
  schedule:
    - cron: '17 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-private-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate GitHub stats badge
        uses: jansitarski/gh-activity-badge@v1
        with:
          github_token: ${{ secrets.PROFILE_STATS_TOKEN }}
          username: jansitarski
          stats_start_marker: '<!-- private-stats:start -->'
          stats_end_marker: '<!-- private-stats:end -->'

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update GitHub stats badge'
          file_pattern: 'gh_stats.svg README.md'
